<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HRD Kita">
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root">
      <div id="web-splash">
        <img src="/splash.png" alt="Loading..." />
      </div>
    </div>
  
    <style>
      #web-splash {
        position: fixed;
        inset: 0;
        background: #0f1117; /* Sesuai warna --bg aplikasi Anda */
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #web-splash img {
        max-width: 200px; /* Atur ukuran logo/gambar splash Anda */
        height: auto;
      }
      /* Ketika React siap, kita akan beri kelas fade-out */
      .fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
